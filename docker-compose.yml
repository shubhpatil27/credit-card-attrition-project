
services:

  airflow_init:
    build: .
    container_name: airflow_init
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - .:/opt/airflow
      - ./airflows/dags:/opt/airflow/dags
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "

  airflow_scheduler:
    build: .
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - airflow_init
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - .:/opt/airflow
      - ./airflows/dags:/opt/airflow/dags
    command: scheduler

  airflow_webserver:
    build: .
    container_name: airflow_webserver
    restart: always
    depends_on:
      - airflow_scheduler
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - .:/opt/airflow
      - ./airflows/dags:/opt/airflow/dags
    command: webserver