version: '3'

services:
  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow_webserver
    restart: always
    depends_on:
      - airflow-scheduler
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflows/dags:/opt/airflow/dags
      - ./airflows/logs:/opt/airflow/logs
      - ./airflows/plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflows/dags:/opt/airflow/dags
      - ./airflows/logs:/opt/airflow/logs
      - ./airflows/plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
    command: scheduler

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: airflow_init
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname user \
        --role Admin \
        --email admin@example.com
      "
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    volumes:
      - ./airflows:/opt/airflow
